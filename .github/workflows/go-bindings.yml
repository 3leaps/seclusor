name: Go Bindings (Prep)
# NOTE: Windows arm64 is NOT supported for Go bindings.
# MinGW does not support the arm64 target, and Go's CGo requires MinGW on Windows.
# The release workflow builds windows-arm64 with MSVC for the CLI binary only.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.1)"
        required: true
        type: string
permissions:
  contents: read
  actions: write
env:
  CARGO_TERM_COLOR: always
jobs:
  validate:
    name: Validate Inputs
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate version matches VERSION file
        id: version
        shell: bash
        run: |
          set -euo pipefail
          input_version="${{ inputs.version }}"
          file_version="$(cat VERSION)"
          if [ "$input_version" != "$file_version" ]; then
            echo "ERROR: input version=$input_version does not match VERSION file=$file_version"
            echo "Update VERSION first, or rerun with the correct input."
            exit 1
          fi
          echo "version=$file_version" >> "$GITHUB_OUTPUT"
  build-linux:
    name: Build FFI (Linux)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/fulmenhq/goneat-tools-runner-glibc:v0.3.1
      options: --user root
    needs: validate
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            glibc: "2.17"
            artifact_suffix: linux-amd64
          - target: aarch64-unknown-linux-gnu
            glibc: "2.17"
            artifact_suffix: linux-arm64
    steps:
      - uses: actions/checkout@v4
      - name: Ensure Rust target is installed
        shell: bash
        run: rustup target add ${{ matrix.target }}
      - name: Build FFI
        shell: bash
        run: |
          set -euo pipefail
          cargo zigbuild --release --target "${{ matrix.target }}.${{ matrix.glibc }}" -p seclusor-ffi
      - name: Package FFI
        shell: bash
        run: |
          set -euo pipefail
          target_dir="${{ matrix.target }}.${{ matrix.glibc }}"
          mkdir -p "dist/ffi/${{ matrix.artifact_suffix }}"
          cp "target/${target_dir}/release/libseclusor_ffi.a" "dist/ffi/${{ matrix.artifact_suffix }}/"
      - name: Upload FFI artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ffi-${{ matrix.artifact_suffix }}
          path: dist/ffi/${{ matrix.artifact_suffix }}
  build-macos:
    name: Build FFI (macOS)
    runs-on: macos-14
    needs: validate
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - name: Build FFI (both targets)
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --target x86_64-apple-darwin -p seclusor-ffi
          cargo build --release --target aarch64-apple-darwin -p seclusor-ffi
      - name: Package FFI
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/ffi/darwin-amd64 dist/ffi/darwin-arm64
          cp target/x86_64-apple-darwin/release/libseclusor_ffi.a dist/ffi/darwin-amd64/
          cp target/aarch64-apple-darwin/release/libseclusor_ffi.a dist/ffi/darwin-arm64/
      - name: Upload FFI artifact (darwin-amd64)
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ffi-darwin-amd64
          path: dist/ffi/darwin-amd64
      - name: Upload FFI artifact (darwin-arm64)
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ffi-darwin-arm64
          path: dist/ffi/darwin-arm64
  build-windows:
    name: Build FFI (Windows GNU)
    runs-on: windows-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Install MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc
          path-type: inherit
      - name: Build FFI (GNU target)
        shell: msys2 {0}
        run: |
          set -euo pipefail
          cargo build --release --target x86_64-pc-windows-gnu -p seclusor-ffi
      - name: Package FFI
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/ffi/windows-amd64
          cp target/x86_64-pc-windows-gnu/release/libseclusor_ffi.a dist/ffi/windows-amd64/
      - name: Upload FFI artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ffi-windows-amd64
          path: dist/ffi/windows-amd64
  cbindgen:
    name: Generate C Header
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/fulmenhq/goneat-tools-runner-glibc:v0.3.1
      options: --user root
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Generate C header
        shell: bash
        run: |
          set -euo pipefail
          cbindgen --config cbindgen.toml --crate seclusor-ffi --output seclusor.h
      - name: Upload header
        uses: actions/upload-artifact@v4.6.2
        with:
          name: c-header
          path: seclusor.h
  update-go-bindings:
    name: Create Go Bindings PR
    runs-on: ubuntu-latest
    needs: [validate, build-linux, build-macos, build-windows, cbindgen]
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download all FFI artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          pattern: ffi-*
          path: ffi-libs
      - name: Download C header
        uses: actions/download-artifact@v4.3.0
        with:
          name: c-header
          path: ffi-libs
      - name: Update Go bindings directory
        shell: bash
        run: |
          set -euo pipefail
          header_path="$(find ffi-libs -maxdepth 2 -name seclusor.h | head -n 1)"
          if [ -z "$header_path" ]; then
            echo "ERROR: seclusor.h not found in downloaded artifacts"
            exit 1
          fi

          cp "$header_path" bindings/go/seclusor/include/seclusor.h

          for dir in ffi-libs/ffi-*/; do
            platform="${dir#ffi-libs/ffi-}"
            platform="${platform%/}"
            mkdir -p "bindings/go/seclusor/lib/$platform"
            cp "$dir/libseclusor_ffi.a" "bindings/go/seclusor/lib/$platform/"
          done

          ls -la bindings/go/seclusor/lib/*/
      - name: Validate committed Go bindings on runner platform
        shell: bash
        run: |
          set -euo pipefail
          make go-test-committed
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: go-bindings/v${{ needs.validate.outputs.version }}
          title: "feat(bindings): update Go prebuilt libs for v${{ needs.validate.outputs.version }}"
          body: |
            ## Go Bindings Update

            This PR updates the prebuilt FFI libraries for the Go bindings to:
            v${{ needs.validate.outputs.version }}

            Merge this PR before tagging so the release tags include
            the prebuilt libs and `go get` works for external consumers.

            ### Platforms Updated
            - linux-amd64 (glibc)
            - linux-arm64 (glibc)
            - darwin-amd64
            - darwin-arm64
            - windows-amd64

            ### Testing
            After merging:
            ```bash
            cd bindings/go/seclusor
            go test -v ./...
            ```

            ### Release Follow-up
            Push both release tags from the merge commit:
            ```bash
            VERSION=$(cat VERSION)
            git tag -a "v${VERSION}" -m "v${VERSION}"
            git tag -a "bindings/go/seclusor/v${VERSION}" -m "bindings/go/seclusor/v${VERSION}"
            ```

            ---
            Auto-generated by Go bindings prep workflow for v${{ needs.validate.outputs.version }}
          commit-message: "feat(bindings): update Go prebuilt libs for v${{ needs.validate.outputs.version }}"
          delete-branch: true
