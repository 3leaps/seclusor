name: ci
on:
  push:
    branches: ["main"]
  pull_request:
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
jobs:
  rust-quality:
    name: Rust Quality (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.94.0
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install rust tools
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-deny --locked
          cargo install cbindgen --locked
      - name: CI checks
        shell: bash
        run: |
          set -euo pipefail
          make ci
      - name: Go bindings tests
        shell: bash
        run: |
          set -euo pipefail
          make go-test
      - name: TypeScript bindings tests
        shell: bash
        run: |
          set -euo pipefail
          make ts-test
  macos-test:
    name: Test (macOS arm64)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.94.0
      - name: Build and test
        shell: bash
        run: |
          set -euo pipefail
          cargo clippy --workspace --all-targets --all-features -- -D warnings
          cargo test --workspace --all-features
  windows-cross-check:
    name: Cross-check (Windows)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: ${{ matrix.target }}
      - name: Type-check Windows target
        shell: bash
        run: |
          set -euo pipefail
          # cargo check (type-check only, no linking) catches Windows-specific
          # compile errors without requiring Windows SDK or linkers.
          # FFI crate excluded — uses platform-specific linking.
          cargo check --workspace --exclude seclusor-ffi --target ${{ matrix.target }}
  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.94.0
      - name: Install cargo-cyclonedx
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-cyclonedx --locked
      - name: Generate SBOM
        shell: bash
        run: |
          set -euo pipefail
          cargo cyclonedx --all --format json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: "**/bom.json"
