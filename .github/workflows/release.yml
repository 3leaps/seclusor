name: release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
jobs:
  build-assets:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: seclusor
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            bin_name: seclusor
            archive_ext: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            bin_name: seclusor
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: seclusor.exe
            archive_ext: zip
          - os: windows-latest-arm64-s
            target: aarch64-pc-windows-msvc
            bin_name: seclusor.exe
            archive_ext: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Verify target installed
        shell: bash
        run: rustup target add ${{ matrix.target }}
      - name: Install Linux cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build binary
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          set -euo pipefail
          cargo build --release --target "${{ matrix.target }}" -p seclusor
      - name: Package archive (Unix)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${GITHUB_REF_NAME#v}"
          archive="dist/seclusor-v${version}-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" "${{ matrix.bin_name }}"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
        id: pkg_unix
      - name: Package archive (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $version = "$env:GITHUB_REF_NAME" -replace '^v', ''
          $archive = "dist/seclusor-v${version}-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" -DestinationPath $archive
          "archive=$archive" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        id: pkg_windows
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: dist/*.${{ matrix.archive_ext }}
  publish-draft:
    name: Publish Draft Release
    runs-on: ubuntu-latest
    needs: build-assets
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          find dist -type f \( -name "*.tar.gz" -o -name "*.zip" \) | sort | while read -r f; do
            shasum -a 256 "$f"
          done > dist/SHA256SUMS
          find dist -type f \( -name "*.tar.gz" -o -name "*.zip" \) | sort | while read -r f; do
            shasum -a 512 "$f"
          done > dist/SHA512SUMS
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            dist/**/*
