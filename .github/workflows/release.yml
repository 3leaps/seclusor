name: release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
jobs:
  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Validate VERSION matches tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          file_version="$(cat VERSION)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$file_version" != "$tag_version" ]; then
            echo "VERSION mismatch: file=$file_version tag=$tag_version"
            exit 1
          fi
          echo "version=$file_version" >> "$GITHUB_OUTPUT"
  verify-go-bindings-assets:
    name: Verify Go Binding Assets
    runs-on: ubuntu-latest
    needs: validate-version
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Verify Go module contains prebuilt libs
        shell: bash
        run: |
          set -euo pipefail

          test -f bindings/go/seclusor/go.mod
          test -f bindings/go/seclusor/include/seclusor.h

          for platform in \
            darwin-amd64 \
            darwin-arm64 \
            linux-amd64 \
            linux-arm64 \
            windows-amd64
          do
            path="bindings/go/seclusor/lib/${platform}/libseclusor_ffi.a"
            if [ ! -f "$path" ]; then
              echo "ERROR: missing $path"
              echo "Release tags MUST point at a commit that includes prebuilt Go binding libs."
              echo "Fix: merge the go-bindings update commit/PR and re-tag a new version."
              exit 1
            fi
            if [ ! -s "$path" ]; then
              echo "ERROR: empty $path"
              exit 1
            fi
          done

          echo "Go binding assets verified."
  build-assets:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: validate-version
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: seclusor
            asset_name: seclusor-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            bin_name: seclusor
            asset_name: seclusor-linux-arm64
          - os: macos-14
            target: aarch64-apple-darwin
            bin_name: seclusor
            asset_name: seclusor-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: seclusor.exe
            asset_name: seclusor-windows-amd64.exe
          - os: windows-latest-arm64-s
            target: aarch64-pc-windows-msvc
            bin_name: seclusor.exe
            asset_name: seclusor-windows-arm64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Verify target installed
        shell: bash
        run: rustup target add ${{ matrix.target }}
      - name: Install Linux cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build binary
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          set -euo pipefail
          cargo build --release --target "${{ matrix.target }}" -p seclusor
      - name: Stage release asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "dist/${{ matrix.asset_name }}"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: build-${{ matrix.target }}
          path: dist/${{ matrix.asset_name }}
  publish-draft:
    name: Publish Draft Release
    runs-on: ubuntu-latest
    needs: [verify-go-bindings-assets, build-assets]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Download artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: artifacts
      - name: Flatten and generate checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -type f -name "seclusor-*" -exec cp {} dist/ \;
          cd dist
          ls -1 seclusor-* | sort | while read -r f; do
            shasum -a 256 "$f"
          done > SHA256SUMS
          ls -1 seclusor-* | sort | while read -r f; do
            shasum -a 512 "$f"
          done > SHA512SUMS
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            dist/*
